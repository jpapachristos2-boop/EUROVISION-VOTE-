<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mini Eurovision Voting</title>

<style>

body{
    margin:0;
    padding:40px;
    background:#0b1020;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

h1{
    font-size:48px;
    margin-bottom:40px;
}

button{
    background:#ffcc00;
    color:black;
    border:none;
    padding:18px 35px;
    font-size:22px;
    border-radius:14px;
    cursor:pointer;
    font-weight:bold;
    margin-bottom:40px;
}

#results{
    max-width:700px;
    margin:auto;
}

.result-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.08);
    margin:15px 0;
    padding:22px;
    border-radius:16px;
    font-size:24px;

    opacity:0;
    transform:translateY(30px);

    transition:all 0.8s ease;
}

.country-score{
    color:#ffcc00;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>Mini Eurovision Voting</h1>

<button onclick="revealResults()">
Reveal Results
</button>

<div id="results"></div>

<script>

const contestants = [

    { name: "Belgium", score: 41 },
    { name: "Germany", score: 56 },
    { name: "Spain", score: 65 },
    { name: "Greece", score: 77 },
    { name: "France", score: 82 },
    { name: "Italy", score: 97 },
    { name: "Sweden", score: 120 }

];

async function revealResults(){

    const resultsContainer =
        document.getElementById("results");

    resultsContainer.innerHTML = "";

    // Ταξινόμηση από μικρότερο -> μεγαλύτερο
    const sorted =
        contestants.sort((a,b)=>a.score-b.score);

    for(const contestant of sorted){

        const row =
            document.createElement("div");

        row.className = "result-row";

        row.innerHTML = `
            <div>${contestant.name}</div>

            <div class="country-score">
                ${contestant.score} pts
            </div>
        `;

        resultsContainer.appendChild(row);

        // animation
        setTimeout(()=>{
            row.style.opacity = "1";
            row.style.transform = "translateY(0)";
        },100);

        // ΠΕΡΙΜΕΝΕΙ 2 ΔΕΥΤΕΡΟΛΕΠΤΑ
        await new Promise(resolve =>
            setTimeout(resolve,2000)
        );
    }
}

</script>

</body>
</html>
