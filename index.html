<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Eurovision</title>

    <style>
        body {
            background: #0b1020;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 30px;
        }

        button {
            background: #ffcc00;
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 22px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 40px;
        }

        #results {
            max-width: 700px;
            margin: auto;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.08);
            margin: 15px 0;
            padding: 20px;
            border-radius: 14px;
            font-size: 24px;
            opacity: 0;
            transform: translateY(30px);
        }

        .country-score {
            color: #ffcc00;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Mini Eurovision Voting</h1>

    <button onclick="revealResults()">
        Reveal Results
    </button>

    <div id="results"></div>

    <script>
        const contestants = [
            { name: "France", score: 82 },
            { name: "Belgium", score: 41 },
            { name: "Italy", score: 97 },
            { name: "Spain", score: 65 },
            { name: "Sweden", score: 120 },
            { name: "Greece", score: 77 },
            { name: "Germany", score: 56 }
        ];

        const resultsContainer = document.getElementById("results");

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function revealResults() {

            resultsContainer.innerHTML = "";

            const sorted = contestants.sort((a, b) => a.score - b.score);

            for (let i = 0; i < sorted.length; i++) {

                const contestant = sorted[i];

                const row = document.createElement("div");

                row.className = "result-row";

                row.innerHTML = `
                    <div>${contestant.name}</div>
                    <div class="country-score">
                        ${contestant.score} pts
                    </div>
                `;

                resultsContainer.appendChild(row);

                await sleep(100);

                row.style.transition = "all 0.8s ease";
                row.style.opacity = "1";
                row.style.transform = "translateY(0)";

                await sleep(2000);
            }
        }
    </script>

</body>
</html>
